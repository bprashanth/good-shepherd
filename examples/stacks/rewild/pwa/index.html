<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plot Picker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <div class="header">
            <h1>Site Assessment</h1>
            <div class="header-subtitle" id="advisoryBanner" hidden></div>
        </div>

        <div class="map-wrapper">
            <div id="map"></div>
            <div class="map-overlay-ring"></div>
        </div>

        <div class="controls">
            <div class="selector-group is-locked" id="plot-selector">
                <div class="selector-info">
                    <div class="label">Plot</div>
                    <div class="value" id="plot-display">Plot 1</div>
                </div>
                <div class="selector-controls">
                    <div class="nav-btn disabled">•</div>
                    <div class="nav-btn disabled">•</div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="selector-group" id="target-selector">
                <div class="selector-info" onclick="cycleTarget(1)">
                    <div class="label">Survey Target</div>
                    <div class="value" id="target-display">Center</div>
                </div>
                <div class="selector-controls">
                    <div class="nav-btn" onclick="cycleTarget(1, event)">▲</div>
                    <div class="nav-btn" onclick="cycleTarget(-1, event)">▼</div>
                </div>
            </div>

            <button class="plus-btn" onclick="triggerUpload()">+</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <h2>Verify Upload</h2>
            <div class="modal-meta" id="modalMeta"></div>
            <div id="imagePreviewContainer"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-submit" onclick="submitFile()">Submit</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>

</html>
