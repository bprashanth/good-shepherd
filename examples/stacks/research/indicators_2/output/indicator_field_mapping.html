<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Mapping</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
    header { padding: 16px 24px; background: #1f2937; color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    main { padding: 16px; display: grid; gap: 16px; }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; }
    .mapping-table { display: grid; grid-template-columns: 1fr 2fr 2fr; gap: 8px; font-weight: 600; border-bottom: 1px solid #e5e7eb; padding-bottom: 6px; }
    .mapping-row { display: grid; grid-template-columns: 1fr 2fr 2fr; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .mapping-row--unmatched { border: 1px solid #fca5a5; border-radius: 6px; padding: 8px; }
    .mapping-cell { font-size: 12px; color: #111827; }
    h2 { margin: 0 0 8px 0; font-size: 18px; }
    .item { border-top: 1px solid #f0f0f0; padding: 8px 0; }
    .label { font-weight: 600; }
    .muted { color: #6b7280; font-size: 12px; }
    .cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    a { color: #e5e7eb; text-decoration: none; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Field Mapping</h1>
    <a href="indicator_wizard.html">Back to wizard</a>
  </header>
  <main>
    <section class="panel">
      <h2>Field Mapping</h2>
      <div class="mapping-table">
        <div class="mapping-header">Canonical Name</div>
        <div class="mapping-header">Aliases</div>
        <div class="mapping-header">Sources</div>
      </div>
      <div id="mapping-rows"></div>
    </section>
  </main>
  <script>
    const variablesCodebook = {"variables": [{"canonical_name": "Area", "aliases": [{"name": "Area", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Can_den", "aliases": [{"name": "Can_den", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Can_vis", "aliases": [{"name": "Can_vis", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Chave_E", "aliases": [{"name": "Chave_E", "source": "Resto_site_info.csv"}]}, {"canonical_name": "DBH", "aliases": [{"name": "DBH", "source": "tree_data.csv"}]}, {"canonical_name": "Forest_name", "aliases": [{"name": "Forest_name", "source": "Resto_site_info.csv"}]}, {"canonical_name": "HD_include", "aliases": [{"name": "HD_include", "source": "tree_data.csv"}]}, {"canonical_name": "Habt_New", "aliases": [{"name": "Habt_New", "source": "species_traits.csv"}]}, {"canonical_name": "Height", "aliases": [{"name": "Height", "source": "tree_data.csv"}]}, {"canonical_name": "Lat", "aliases": [{"name": "Lat", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Long", "aliases": [{"name": "Long", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Plant_den", "aliases": [{"name": "Plant_den", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Plant_div", "aliases": [{"name": "Plant_div", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Plot_code", "aliases": [{"name": "Plot_code", "source": "Resto_site_info.csv"}, {"name": "Plot_code", "source": "tree_data.csv"}, {"name": "Plot_code", "source": "regen_data.csv"}, {"name": "Plot_code", "source": "cache/gee_data.json"}]}, {"canonical_name": "Remarks", "aliases": [{"name": "Remarks", "source": "tree_data.csv"}]}, {"canonical_name": "Rest_area", "aliases": [{"name": "Rest_area", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Site_code", "aliases": [{"name": "Site_code", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Site_name", "aliases": [{"name": "Site_name", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Species.name", "aliases": [{"name": "Species.name", "source": "regen_data.csv"}]}, {"canonical_name": "Treatment", "aliases": [{"name": "Treatment", "source": "tree_data.csv"}, {"name": "Treatment", "source": "regen_data.csv"}]}, {"canonical_name": "Type", "aliases": [{"name": "Type", "source": "Resto_site_info.csv"}]}, {"canonical_name": "Wden_gen", "aliases": [{"name": "Wden_gen", "source": "species_traits.csv"}]}, {"canonical_name": "Wden_sp", "aliases": [{"name": "Wden_sp", "source": "species_traits.csv"}]}, {"canonical_name": "Year_restored", "aliases": [{"name": "Year_restored", "source": "Resto_site_info.csv"}]}, {"canonical_name": "acc_name", "aliases": [{"name": "acc_name", "source": "regen_data.csv"}, {"name": "acc_name", "source": "species_traits.csv"}]}, {"canonical_name": "accpt.nam", "aliases": [{"name": "accpt.nam", "source": "tree_data.csv"}]}, {"canonical_name": "ae_vector", "aliases": [{"name": "ae_vector", "source": "cache/gee_data.json"}]}, {"canonical_name": "dist_PA", "aliases": [{"name": "dist_PA", "source": "Resto_site_info.csv"}]}, {"canonical_name": "latitude", "aliases": [{"name": "latitude", "source": "db.json"}]}, {"canonical_name": "longitude", "aliases": [{"name": "longitude", "source": "db.json"}]}, {"canonical_name": "meta_height", "aliases": [{"name": "meta_height", "source": "cache/gee_data.json"}]}, {"canonical_name": "regen", "aliases": [{"name": "regen", "source": "regen_data.csv"}]}, {"canonical_name": "siteId", "aliases": [{"name": "siteId", "source": "db.json"}]}, {"canonical_name": "species", "aliases": [{"name": "species", "source": "tree_data.csv"}]}, {"canonical_name": "timestamp", "aliases": [{"name": "timestamp", "source": "db.json"}]}]};
    const variables = (variablesCodebook && variablesCodebook.variables) || [];

    const mappingRows = document.getElementById("mapping-rows");
    mappingRows.innerHTML = variables.map(entry => {
      const aliases = (entry.aliases || []).map(a => a.name).join(", ");
      const sources = (entry.aliases || []).map(a => a.source).join(", ");
      const highlight = entry.unmatched_source ? " mapping-row--unmatched" : "";
      return `
        <div class="mapping-row${highlight}">
          <div class="mapping-cell">${escapeHtml(entry.canonical_name || "")}</div>
          <div class="mapping-cell">${escapeHtml(aliases)}</div>
          <div class="mapping-cell">${escapeHtml(sources)}</div>
        </div>
      `;
    }).join("");

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value == null ? "" : String(value);
      return div.innerHTML;
    }
  </script>
</body>
</html>
