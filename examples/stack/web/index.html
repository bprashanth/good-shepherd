<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Shepherd Practitioner Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Good Shepherd</h1>
        </header>

        <div class="grid">
            <div class="card card-experiment" data-target="http://localhost:8031/wizard.html">
                <div class="card-bg"></div>
                <div>
                    <div class="card-title">Stage 1</div>
                </div>
                <div class="card-value">Where To Intervene?</div>
                <div class="card-status">
                    Localhost:8031
                </div>
            </div>

            <div class="card card-phone" data-target="http://localhost:8032/index.html">
                <div class="card-bg"></div>
                <div>
                    <div class="card-title">Stage 2</div>
                </div>
                <div class="card-value">What Is Growing There?</div>
                <div class="card-status">
                    Localhost:8032
                </div>
            </div>

            <div class="card card-data" data-target="http://localhost:8033/index.html">
                <div class="card-bg"></div>
                <div>
                    <div class="card-title">Stage 3</div>
                </div>
                <div class="card-value">What To Plant There?</div>
                <div class="card-status">
                    Localhost:8033
                </div>
            </div>

            <div class="card card-indicators" data-target="http://localhost:8032/index.html">
                <div class="card-bg"></div>
                <div>
                    <div class="card-title">Stage 4</div>
                </div>
                <div class="card-value">Monitoring</div>
                <div class="card-status">
                    Reuses PWA
                </div>
            </div>

            <div class="card card-alien" data-target="http://localhost:5173">
                <div class="card-bg"></div>
                <div>
                    <div class="card-title">Stage 5</div>
                </div>
                <div class="card-value">Data</div>
                <div class="card-status">
                    Localhost:5173
                </div>
            </div>

            <div class="card card-placeholder-1" data-target="http://localhost:8034/index.html">
                <div class="card-bg"></div>
                <div>
                    <div class="card-title">Stage 6</div>
                </div>
                <div class="card-value">Recovery</div>
                <div class="card-status">
                    Localhost:8034
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
